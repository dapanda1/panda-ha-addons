# Plex WoL Dashboard Card
#
# SETUP:
# 1. Add the following rest_command entries to your HA configuration.yaml:
#
#    rest_command:
#      plex_wol_toggle_wol:
#        url: "http://localhost:32401/toggle/wol"
#        method: POST
#      plex_wol_toggle_geoip:
#        url: "http://localhost:32401/toggle/geoip"
#        method: POST
#      plex_wol_toggle_quiet:
#        url: "http://localhost:32401/toggle/quiet"
#        method: POST
#      plex_wol_toggle_sleep:
#        url: "http://localhost:32401/toggle/sleep"
#        method: POST
#
# 2. Restart HA after editing configuration.yaml
# 3. Add the card below to your Lovelace dashboard:
#    - Go to your HA dashboard
#    - Click the 3-dot menu → Edit Dashboard
#    - Click "+ Add Card" → Manual
#    - Paste the YAML below

type: vertical-stack
cards:
  # Header
  - type: markdown
    content: |
      ## 🟣 Plex WoL Proxy

  # Server status and uptime
  - type: entities
    entities:
      - entity: sensor.plex_wol_server_status
        name: Server Status
        icon: mdi:server
      - entity: sensor.plex_wol_last_wake
        name: Last Wake
        icon: mdi:alarm
      - entity: sensor.plex_wol_last_wake_user
        name: Last Wake User
        icon: mdi:account
      - entity: sensor.plex_wol_connection_count
        name: Total Connections
        icon: mdi:counter
      - entity: sensor.plex_wol_unique_ips_today
        name: Unique IPs Today
        icon: mdi:ip-network

  # Toggle controls (calls REST endpoint on health check port)
  - type: horizontal-stack
    cards:
      - type: button
        name: WoL
        icon: mdi:power
        tap_action:
          action: call-service
          service: rest_command.plex_wol_toggle_wol
        hold_action:
          action: none
      - type: button
        name: GeoIP
        icon: mdi:earth
        tap_action:
          action: call-service
          service: rest_command.plex_wol_toggle_geoip
        hold_action:
          action: none
      - type: button
        name: Quiet
        icon: mdi:volume-off
        tap_action:
          action: call-service
          service: rest_command.plex_wol_toggle_quiet
        hold_action:
          action: none
      - type: button
        name: Sleep
        icon: mdi:sleep
        tap_action:
          action: call-service
          service: rest_command.plex_wol_toggle_sleep
        hold_action:
          action: none

  # History graph for connections
  - type: history-graph
    title: Connection History
    hours_to_show: 24
    entities:
      - entity: sensor.plex_wol_connection_count
        name: Connections
      - entity: sensor.plex_wol_unique_ips_today
        name: Unique IPs
