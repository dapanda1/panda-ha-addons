# Plex WoL Dashboard Card
#
# Add this to your Lovelace dashboard:
# 1. Go to your HA dashboard
# 2. Click the 3-dot menu → Edit Dashboard
# 3. Click "+ Add Card" → Manual
# 4. Paste the YAML below

type: vertical-stack
cards:
  # Header
  - type: markdown
    content: |
      ## 🟣 Plex WoL Proxy

  # Server status and uptime
  - type: entities
    entities:
      - entity: sensor.plex_wol_server_status
        name: Server Status
        icon: mdi:server
      - entity: sensor.plex_wol_last_wake
        name: Last Wake
        icon: mdi:alarm
      - entity: sensor.plex_wol_last_wake_user
        name: Last Wake User
        icon: mdi:account
      - entity: sensor.plex_wol_connection_count
        name: Total Connections
        icon: mdi:counter
      - entity: sensor.plex_wol_unique_ips_today
        name: Unique IPs Today
        icon: mdi:ip-network

  # Toggle controls
  - type: entities
    title: Controls
    entities:
      - entity: input_boolean.plex_wol_enabled
        name: WoL Enabled
        icon: mdi:power
      - entity: input_boolean.plex_wol_geoip
        name: GeoIP Blocking
        icon: mdi:earth
      - entity: input_boolean.plex_wol_quiet_mode
        name: Quiet Mode
        icon: mdi:volume-off
      - entity: input_boolean.plex_wol_sleep_trigger
        name: Sleep Trigger
        icon: mdi:sleep

  # History graph for connections
  - type: history-graph
    title: Connection History
    hours_to_show: 24
    entities:
      - entity: sensor.plex_wol_connection_count
        name: Connections
      - entity: sensor.plex_wol_unique_ips_today
        name: Unique IPs
